services:
  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_URL: "${APP_URL:-http://localhost:8080/}"
      CONTACT_TO: "${CONTACT_TO:-info@dreambouwgroup.com}"
      DB_CONNECTION: "${DB_CONNECTION:-mysql}"
      DB_HOST: "${DB_HOST:-db}"
      DB_PORT: "${DB_PORT:-3306}"
      DB_DATABASE: "${DB_DATABASE:-dreambouw}"
      DB_USERNAME: "${DB_USERNAME:-dreambouw}"
      DB_PASSWORD: "${DB_PASSWORD:-dreambouw}"
      DB_CHARSET: "${DB_CHARSET:-utf8mb4}"
      DATABASE_PATH: "${DATABASE_PATH:-/var/www/html/storage/database.sqlite}"
    volumes:
      - ./:/var/www/html
      - contact_storage:/var/www/html/storage

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: "${DB_DATABASE:-dreambouw}"
      MARIADB_USER: "${DB_USERNAME:-dreambouw}"
      MARIADB_PASSWORD: "${DB_PASSWORD:-dreambouw}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-dreambouw_root}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  contact_storage:
  mysql_data:
